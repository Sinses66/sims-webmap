[pytest]
DJANGO_SETTINGS_MODULE = test_settings
pythonpath = .
# Restreindre la collecte aux apps — évite que test_settings.py / test_urls.py
# (fichiers de config, pas de tests) soient ramassés par le collecteur.
testpaths = sims_network sims_core
python_files = tests/test_*.py test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
