name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  # ── Backend : lint + migrations + tests ─────────────────────────
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:15-3.4-alpine
        env:
          POSTGRES_DB:       sims_db
          POSTGRES_USER:     sims_user
          POSTGRES_PASSWORD: sims_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgis://sims_user:sims_password@localhost:5432/sims_db
      SECRET_KEY:   ci-secret-key-not-for-production
      DEBUG:        "True"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt flake8

      - name: Lint — flake8
        run: |
          cd django_sims_core
          flake8 sims_core sims_network \
            --max-line-length=120 \
            --exclude=migrations \
            --count --statistics

      - name: Check — no pending migrations
        run: python manage.py migrate --check
        env:
          DJANGO_SETTINGS_MODULE: eneo_backend.settings

      - name: Test — pytest
        run: |
          cd django_sims_core
          python -m pytest sims_core/tests/ sims_network/tests/ -v --tb=short

  # ── Frontend : lint + tests unitaires ───────────────────────────
  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: eneo-webmap-frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd eneo-webmap-frontend
          npm ci

      - name: Lint — ESLint
        run: |
          cd eneo-webmap-frontend
          npm run lint

      - name: Test — Vitest
        run: |
          cd eneo-webmap-frontend
          npm run test:run
